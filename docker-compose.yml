version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: openticket-db
    environment:
      POSTGRES_USER: openticket_user
      POSTGRES_PASSWORD: openticket_password
      POSTGRES_DB: openticket_dev
    ports:
      - "5432:5432"
    volumes:
      - openticket-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  openticket-pgdata:
