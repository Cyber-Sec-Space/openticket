services:
  db:
    image: postgres:15-alpine
    container_name: openticket_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openticket_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecurepassword}
      POSTGRES_DB: ${POSTGRES_DB:-openticket_prod}
    volumes:
      - openticket_data:/var/lib/postgresql/data
    # Security: Only expose DB port to localhost, not to all interfaces
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: openticket_pgbouncer
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openticket_admin}:${POSTGRES_PASSWORD:-supersecurepassword}@db:5432/${POSTGRES_DB:-openticket_prod}
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "20"
      POOL_MODE: "transaction"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits"
      AUTH_TYPE: "scram-sha-256"
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: openticket_migrator
    # Automatically apply schema migrations through the Builder stage to access necessary typescript TSX hooks, then trigger scripts
    command: npm run migrate:prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-openticket_admin}:${POSTGRES_PASSWORD:-supersecurepassword}@db:5432/${POSTGRES_DB:-openticket_prod}
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openticket_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Use PgBouncer connection for the main application querying and attach ?pgbouncer=true parameter for Prisma
      - DATABASE_URL=postgresql://${POSTGRES_USER:-openticket_admin}:${POSTGRES_PASSWORD:-supersecurepassword}@pgbouncer:5432/${POSTGRES_DB:-openticket_prod}?pgbouncer=true
      # Security: AUTH_SECRET MUST be set in .env — no weak fallback allowed
      - AUTH_SECRET=${AUTH_SECRET:?ERROR: AUTH_SECRET must be set in .env file. Generate one with: openssl rand -base64 33}
      # Sync NEXTAUTH_SECRET for plugin encryption compatibility
      - NEXTAUTH_SECRET=${AUTH_SECRET:?}
      - AUTH_TRUST_HOST=true
    depends_on:
      migrator:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    # Server will boot natively according to Dockerfile CMD after migrator completes

volumes:
  openticket_data:
