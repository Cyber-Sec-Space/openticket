name: CI
on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-dummy-secret-key-that-is-at-least-32-chars
      JWT_SECRET: ci-dummy-secret-key-that-is-at-least-32-chars
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run test -- --coverage --forceExit
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
